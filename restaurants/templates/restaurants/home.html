<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{% static 'restaurants/css/base.css' %}" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="filters-panel">
        <header class="filters-header">
          <h1>{{ page_title }}</h1>
          <p class="subtitle">Discover new favorites around Austin.</p>
        </header>
        <form id="filters-form" class="filters-form">
          <div class="filter-group">
            <label for="cuisine-select">Cuisine</label>
            <select id="cuisine-select" name="cuisine" multiple>
              {% for cuisine in cuisines %}
                <option value="{{ cuisine.key }}">{{ cuisine.label }}</option>
              {% endfor %}
            </select>
            <small>Select one or more cuisines to narrow the results.</small>
          </div>
          <div class="filter-group">
            <span class="label">Price</span>
            <div class="price-options">
              <label>
                <input type="radio" name="price" value="" checked />
                Any
              </label>
              {% for tier in price_tiers %}
                <label>
                  <input type="radio" name="price" value="{{ tier.value }}" />
                  {{ tier.label }}
                </label>
              {% endfor %}
            </div>
          </div>
          <div class="filter-group">
            <label for="rating-min">Minimum rating</label>
            <input
              id="rating-min"
              name="rating_min"
              type="range"
              min="0"
              max="5"
              step="0.5"
              value="0"
            />
            <output id="rating-display">0+</output>
          </div>
          <div class="filter-group toggle">
            <label>
              <input type="checkbox" name="open_now" value="true" />
              Open now
            </label>
          </div>
        </form>
      </aside>
      <main class="map-content">
        <section class="map-wrapper">
          <div id="map" class="map" role="presentation"></div>
        </section>
        <section class="list-wrapper">
          <header class="list-header">
            <h2>Restaurants</h2>
            <p id="results-count" class="results-count">Loading restaurants…</p>
          </header>
          <ul id="restaurants-list" class="restaurants-list" aria-live="polite"></ul>
        </section>
      </main>
    </div>

    <script id="restaurant-config" type="application/json">{{ config_json|safe }}</script>
    <script src="{% static 'restaurants/js/app.js' %}"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initRestaurantFinder" async defer></script>
  </body>
</html>
